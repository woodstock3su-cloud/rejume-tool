<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>かんたん履歴書作成｜無料のJIS規格履歴書メーカー</title>

<style>
  :root{
    --line:#2b2b2b;
    --line-thin:#888;
    --paper:#ffffff;
    --bg:#e9ebee;
    --accent:#1a4d7a;
    --muted:#6b7280;

    /* ---- サイト全体テーマ ---- */
    --site-navy:#182b45;
    --site-navy-deep:#101d30;
    --site-paper:#faf7f1;
    --site-hanko:#b4432f;
    --site-hanko-deep:#8f3123;
    --site-gold:#b6934f;
    --site-ink-muted:#5c6470;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    background:var(--bg);
    color:var(--line);
  }
  .sans{font-family:"Hiragino Sans","Noto Sans JP",sans-serif;}

  /* ================= サイトヘッダー ================= */
  .site-header{
    background:var(--site-navy-deep);
    color:#f3ede2;
    padding:14px 6vw;
    display:flex;align-items:center;justify-content:space-between;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  .site-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:.04em;}
  .site-logo .mark{
    width:26px;height:26px;border-radius:50%;
    border:2px solid var(--site-hanko);
    display:flex;align-items:center;justify-content:center;
    color:var(--site-hanko);font-size:12px;font-weight:700;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  }
  .site-nav a{color:#cdd3dd;text-decoration:none;font-size:13px;margin-left:22px;}
  .site-nav a:hover{color:#fff;}

  /* ================= ヒーロー ================= */
  .hero{
    background:
      radial-gradient(circle at 82% 18%, rgba(180,67,47,.13), transparent 42%),
      linear-gradient(180deg, var(--site-navy) 0%, var(--site-navy-deep) 100%);
    color:#f3ede2;
    padding:64px 6vw 56px;
    position:relative;
    overflow:hidden;
  }
  .hero-inner{max-width:920px;margin:0 auto;position:relative;}
  .hero-eyebrow{
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:12px;letter-spacing:.22em;color:var(--site-gold);
    margin-bottom:14px;text-transform:uppercase;
  }
  .hero h1{
    font-size:clamp(28px,4.4vw,46px);
    line-height:1.5;margin:0 0 18px;font-weight:700;
  }
  .hero p{
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:15px;line-height:1.9;color:#cdd3dd;max-width:560px;margin:0 0 28px;
  }
  .hero-cta{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--site-hanko);color:#fff;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-weight:700;font-size:14px;
    padding:13px 26px;border-radius:3px;text-decoration:none;
    box-shadow:0 6px 18px rgba(180,67,47,.35);
  }
  .hero-cta:hover{background:var(--site-hanko-deep);}

  /* 印鑑（はんこ）風サイン要素 */
  .hanko{
    position:absolute;
    right:2vw;top:36px;
    width:118px;height:118px;
    border-radius:50%;
    border:3.5px solid var(--site-hanko);
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-9deg);
    color:var(--site-hanko);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:22px;font-weight:700;letter-spacing:.08em;
    writing-mode:vertical-rl;
    opacity:.9;
    box-shadow:inset 0 0 0 2px rgba(180,67,47,.15);
  }
  @media (max-width:760px){ .hanko{ display:none; } }

  /* ================= 特長セクション ================= */
  .features{
    background:var(--site-paper);
    padding:52px 6vw 60px;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  .features-grid{
    max-width:920px;margin:0 auto;
    display:grid;grid-template-columns:repeat(3,1fr);gap:22px;
  }
  @media (max-width:760px){ .features-grid{ grid-template-columns:1fr; } }
  .feature-card{
    background:#fff;border:1px solid #e6e0d3;border-radius:6px;
    padding:22px 20px;
  }
  .feature-card .num{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:13px;color:var(--site-hanko);letter-spacing:.1em;margin-bottom:10px;
  }
  .feature-card h3{font-size:15px;margin:0 0 8px;color:var(--site-navy);}
  .feature-card p{font-size:12.5px;line-height:1.8;color:var(--site-ink-muted);margin:0;}

  /* ================= 広告枠 ================= */
  .ad-slot{
    max-width:920px;margin:0 auto;
    display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:11px;color:#9aa0a8;
    background:#f1f1ee;border:1px dashed #c9c9c2;border-radius:4px;
    min-height:90px;
  }
  .ad-slot-wrap{padding:22px 6vw;background:var(--site-paper);}
  .ad-slot-wrap.on-bg{background:var(--bg);}

  /* ================= 使い方ツール見出し ================= */
  .tool-heading{
    max-width:920px;margin:0 auto;padding:36px 6vw 4px;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  .tool-heading h2{font-size:20px;color:var(--site-navy);margin:0 0 6px;}
  .tool-heading p{font-size:12.5px;color:var(--site-ink-muted);margin:0;}

  /* ================= フッター ================= */
  .site-footer{
    background:var(--site-navy-deep);color:#aab1bd;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    padding:40px 6vw 26px;
  }
  .site-footer-inner{max-width:920px;margin:0 auto;}
  .site-footer h4{color:#f3ede2;font-size:13px;margin:0 0 10px;}
  .site-footer p{font-size:12px;line-height:1.9;margin:0 0 18px;max-width:640px;}
  .site-footer .legal{font-size:11px;color:#77808d;border-top:1px solid #2a3a52;padding-top:16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .site-footer .legal a{color:#9aa4b5;margin-right:16px;text-decoration:none;}
  .site-footer .legal a:hover{color:#fff;}

  @media print{
    .site-header,.hero,.features,.ad-slot-wrap,.tool-heading,.site-footer{display:none !important;}
  }
  /* ---------- ツールバー ---------- */
  .toolbar{
    position:sticky;top:0;z-index:100;
    background:var(--accent);
    color:#fff;
    padding:10px 18px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .toolbar h1{font-size:15px;margin:0 14px 0 0;font-weight:600;letter-spacing:.02em;}
  .toolbar button{
    background:#fff;color:var(--accent);border:none;border-radius:5px;
    padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;
  }
  .toolbar button.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6);}
  .toolbar button:hover{opacity:.85;}
  .toolbar .hint{font-size:12px;opacity:.85;margin-left:auto;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;}

  /* ---------- 用紙 ---------- */
  .sheet-wrap{
    padding:28px 0 60px;
    display:flex;flex-direction:column;align-items:center;gap:24px;
  }
  .sheet{
    background:var(--paper);
    width:210mm;
    min-height:297mm;
    padding:10mm 10mm;
    box-shadow:0 3px 14px rgba(0,0,0,.18);
    position:relative;
  }
  .page-label{
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px;
  }

  [contenteditable="true"]{
    outline:none;
    min-height:1.2em;
  }
  [contenteditable="true"]:hover{ background:rgba(26,77,122,.05); }
  [contenteditable="true"]:focus{ background:rgba(26,77,122,.09); }
  [data-empty]:empty:before{
    content: attr(data-empty);
    color:#b3b3b3;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:12px;
  }

  table{border-collapse:collapse;width:100%;}
  td,th{border:1px solid var(--line);padding:4px 6px;vertical-align:middle;}

  /* ---------- ヘッダー ---------- */
  .title-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;}
  .title-row h2{font-size:26px;letter-spacing:.5em;margin:0;padding-left:.5em;}
  .title-row .date-box{font-size:12px;text-align:right;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;}
  .title-row .date-box span[contenteditable]{display:inline-block;min-width:2em;text-align:center;border-bottom:1px solid var(--line);}

  .top-table{margin-bottom:0;}
  .top-table td{font-size:13px;}
  .furigana{font-size:11px;color:#444;}
  .name-cell{font-size:22px;padding:8px 6px;}
  .label-sm{font-size:10px;color:#444;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;}

  .photo-box{
    width:30mm;height:40mm;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    text-align:center;font-size:10px;color:#999;
    cursor:pointer;position:relative;overflow:hidden;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    line-height:1.4;
  }
  .photo-box img{width:100%;height:100%;object-fit:cover;}
  .photo-box input{display:none;}
  .photo-remove{
    position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;
    border:none;border-radius:3px;font-size:9px;padding:2px 4px;cursor:pointer;display:none;
  }
  .photo-box.has-img .photo-remove{display:block;}

  .addr-block td{font-size:12.5px;}
  .row-label{
    writing-mode:vertical-rl;text-orientation:upright;
    font-size:11px;text-align:center;letter-spacing:.15em;color:#333;
    width:9mm;
  }

  /* ---------- 学歴職歴テーブル ---------- */
  .hist-table{margin-top:6mm;}
  .hist-table th{
    font-size:11px;font-weight:600;background:#f4f5f6;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  .hist-table td{font-size:12.5px;height:6.3mm;}
  .hist-table td.y,.hist-table td.m{width:14mm;text-align:center;}
  .hist-table td.content{}
  .hist-table td.center{text-align:center;color:#333;}
  .add-row-btn{
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:11px;color:var(--accent);background:#eef4fa;border:1px dashed var(--accent);
    border-radius:4px;padding:3px 8px;cursor:pointer;margin-top:3px;
  }
  .del-row-btn{
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:9px;color:#b3413e;background:#fff0f0;border:1px solid #e3b3b1;
    border-radius:3px;padding:0 4px;cursor:pointer;
  }
  .row-actions{text-align:center;width:8mm;}

  .section-title{
    font-size:12px;font-weight:600;margin:5mm 0 1mm;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    display:flex;justify-content:space-between;align-items:center;
  }
  .section-note{font-size:10px;color:var(--muted);font-weight:400;}

  .free-box{
    border:1px solid var(--line);min-height:26mm;padding:5px 8px;font-size:12.5px;
  }
  .free-box.small{min-height:18mm;}

  .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:5mm;border:1px solid var(--line);}
  .bottom-grid .cell{border-right:1px solid var(--line);padding:5px 8px;font-size:12px;}
  .bottom-grid .cell:last-child{border-right:none;}
  .bottom-grid .lab{font-size:10px;color:#444;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;margin-bottom:2px;}

  .commute-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--line);margin-top:5mm;}
  .commute-grid .cell{border-right:1px solid var(--line);padding:5px 8px;font-size:12px;}
  .commute-grid .cell:last-child{border-right:none;}
  .radio-line{font-family:"Hiragino Sans","Noto Sans JP",sans-serif;font-size:11px;margin-top:4px;}
  .radio-line label{margin-right:10px;cursor:pointer;}

  @media print{
    body{background:#fff;}
    .toolbar{display:none !important;}
    .sheet-wrap{padding:0;gap:0;}
    .sheet{box-shadow:none;margin:0;width:210mm;min-height:297mm;page-break-after:always;}
    .page-label{display:none;}
    .add-row-btn,.del-row-btn,.photo-remove{display:none !important;}
    [contenteditable="true"]:hover,[contenteditable="true"]:focus{background:none;}
  }
  @page{size:A4;margin:0;}
</style>
</head>
<body>

<!-- ================= サイトヘッダー ================= -->
<header class="site-header">
  <div class="site-logo"><span class="mark">履</span>かんたん履歴書</div>
  <nav class="site-nav">
    <a href="#tool">ツールを使う</a>
    <a href="#features">特長</a>
    <a href="#footer-legal">サイトについて</a>
  </nav>
</header>

<!-- ================= ヒーロー ================= -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">無料・登録不要・ブラウザで完結</div>
    <h1>履歴書づくりを、<br>もっとかんたんに。</h1>
    <p>JIS規格にそった履歴書を、そのまま画面上で入力して印刷・PDF保存できるツールです。志望動機や本人希望記入欄は空欄のままでも大丈夫。入力内容はサーバーに送信されず、この端末の中だけで完結します。</p>
    <a href="#tool" class="hero-cta">今すぐ作成をはじめる ↓</a>
  </div>
  <div class="hanko">無料</div>
</section>

<!-- ================= 広告枠：ヒーロー下 ================= -->
<div class="ad-slot-wrap">
  <div class="ad-slot leaderboard">
    広告スペース（Google AdSense）— ここに<script>タグを設置します
    <!-- <ins class="adsbygoogle" style="display:block;width:100%;max-width:920px;height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="horizontal"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
  </div>
</div>

<!-- ================= 特長 ================= -->
<section class="features" id="features">
  <div class="features-grid">
    <div class="feature-card">
      <div class="num">01</div>
      <h3>JIS規格にそのまま準拠</h3>
      <p>年月・学歴職歴・免許資格・本人希望記入欄など、市販の履歴書用紙と同じ構成で作成できます。</p>
    </div>
    <div class="feature-card">
      <div class="num">02</div>
      <h3>空欄のままでもOK</h3>
      <p>志望動機や本人希望記入欄は無理に埋める必要はありません。空欄のまま印刷しても体裁は崩れません。</p>
    </div>
    <div class="feature-card">
      <div class="num">03</div>
      <h3>入力データは送信しません</h3>
      <p>すべての処理はこのページの中だけで完結し、氏名や住所などの個人情報はどこにも送信されません。</p>
    </div>
  </div>
</section>

<!-- ================= ツール見出し ================= -->
<div class="tool-heading" id="tool">
  <h2>履歴書を作成する</h2>
  <p>枠内をクリックして直接入力してください。印刷ボタンからそのままPDF保存もできます。</p>
</div>

<div class="toolbar">
  <h1>履歴書作成ツール（JIS規格）</h1>
  <button onclick="window.print()">🖨 印刷 / PDF保存</button>
  <button class="secondary" onclick="clearAll()">全項目をクリア</button>
  <div class="hint">枠内をクリックして直接入力できます。志望動機や本人希望欄は空欄のままでも印刷できます。</div>
</div>

<div class="sheet-wrap">

  <!-- ===================== 1ページ目 ===================== -->
  <div class="page-label">1 / 2 ページ</div>
  <div class="sheet" id="page1">

    <div class="title-row">
      <h2>履歴書</h2>
      <div class="date-box">
        <span contenteditable="true" data-empty="20">20</span>年
        <span contenteditable="true" data-empty="  ">　</span>月
        <span contenteditable="true" data-empty="  ">　</span>日現在
      </div>
    </div>

    <table class="top-table">
      <tr>
        <td style="width:65%;border-bottom:none;">
          <div class="furigana" contenteditable="true" data-empty="ふりがな">ふりがな</div>
          <div class="name-cell" contenteditable="true" data-empty="氏名"></div>
        </td>
        <td rowspan="3" style="width:35mm;text-align:center;border-left:none;">
          <div class="photo-box" id="photoBox" onclick="document.getElementById('photoInput').click()">
            写真を貼る位置<br>（クリックして選択）<br><span style="font-size:9px">縦40×横30mm</span>
            <button class="photo-remove" onclick="event.stopPropagation();removePhoto()">削除</button>
          </div>
          <input type="file" id="photoInput" accept="image/*" onchange="setPhoto(event)">
        </td>
      </tr>
      <tr>
        <td style="border-top:none;">
          <span class="label-sm">生年月日　</span>
          <span contenteditable="true" data-empty="　　　　" style="display:inline-block;min-width:2.5em;">　</span>年
          <span contenteditable="true" data-empty="　" style="display:inline-block;min-width:1.5em;">　</span>月
          <span contenteditable="true" data-empty="　" style="display:inline-block;min-width:1.5em;">　</span>日生（満
          <span contenteditable="true" data-empty="　" style="display:inline-block;min-width:1.5em;">　</span>歳）
          <span style="margin-left:10px" class="label-sm">性別　</span>
          <span contenteditable="true" data-empty="　" style="display:inline-block;min-width:2em;">　</span>
        </td>
      </tr>
      <tr><td style="height:2mm;border-top:none;"></td></tr>
    </table>

    <table class="addr-block" style="margin-top:-1px;">
      <tr>
        <td style="width:8%;border-right:none;" class="row-label">現住所</td>
        <td style="border-left:none;">
          <div class="furigana" contenteditable="true" data-empty="ふりがな">ふりがな</div>
          <div style="font-size:10px;color:#444;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;">〒
            <span contenteditable="true" data-empty="000-0000" style="display:inline-block;min-width:5em;">　</span>
          </div>
          <div contenteditable="true" data-empty="都道府県から番地・建物名まで記入" style="min-height:1.4em;padding:2px 0;"></div>
        </td>
        <td style="width:28%;border-left:none;vertical-align:bottom;">
          <div class="label-sm">電話</div>
          <div contenteditable="true" data-empty="000-0000-0000" style="font-size:13px;"></div>
        </td>
      </tr>
      <tr>
        <td style="border-right:none;" class="row-label">連絡先</td>
        <td style="border-left:none;">
          <div class="furigana" contenteditable="true" data-empty="ふりがな">ふりがな</div>
          <div style="font-size:10px;color:#444;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;">〒
            <span contenteditable="true" data-empty="000-0000" style="display:inline-block;min-width:5em;">　</span>
          </div>
          <div contenteditable="true" data-empty="現住所以外に連絡を希望する場合のみ記入" style="min-height:1.4em;padding:2px 0;"></div>
        </td>
        <td style="border-left:none;vertical-align:bottom;">
          <div class="label-sm">電話</div>
          <div contenteditable="true" data-empty="（空欄可）" style="font-size:13px;"></div>
        </td>
      </tr>
    </table>

    <div class="section-title">
      <span>学歴・職歴</span>
      <span class="section-note">行の追加・削除ができます</span>
    </div>
    <table class="hist-table" id="histTable1">
      <thead>
        <tr><th style="width:14mm;">年</th><th style="width:14mm;">月</th><th>学歴・職歴</th><th class="row-actions"></th></tr>
      </thead>
      <tbody id="histBody1">
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addRow('histBody1')">＋ 行を追加</button>

  </div>

  <!-- ===================== 2ページ目 ===================== -->
  <div class="page-label">2 / 2 ページ</div>
  <div class="sheet" id="page2">

    <div class="section-title">
      <span>学歴・職歴（つづき）／免許・資格</span>

<script>
function makeRow(placeholder){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="y" contenteditable="true" data-empty="　"></td>
    <td class="m" contenteditable="true" data-empty="　"></td>
    <td class="content" contenteditable="true" data-empty="${placeholder}"></td>
    <td class="row-actions"><button class="del-row-btn" onclick="delRow(this)">×</button></td>
  `;
  return tr;
}
function addRow(bodyId){
  const placeholder = bodyId === 'histBody2' ? '免許・資格名を入力' : '学歴・職歴を入力（例：〇〇高等学校　入学／卒業／〇〇株式会社　入社／退職）';
  document.getElementById(bodyId).appendChild(makeRow(placeholder));
}
function delRow(btn){
  btn.closest('tr').remove();
}
function initRows(){
  for(let i=0;i<6;i++) addRow('histBody1');
  for(let i=0;i<4;i++) addRow('histBody2');
}
initRows();

function setPhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const box = document.getElementById('photoBox');
    box.classList.add('has-img');
    box.innerHTML = `<img src="${ev.target.result}"><button class="photo-remove" onclick="event.stopPropagation();removePhoto()">削除</button>`;
  };
  reader.readAsDataURL(file);
}
function removePhoto(){
  const box = document.getElementById('photoBox');
  box.classList.remove('has-img');
  box.innerHTML = `写真を貼る位置<br>（クリックして選択）<br><span style="font-size:9px">縦40×横30mm</span><button class="photo-remove" onclick="event.stopPropagation();removePhoto()">削除</button>`;
  document.getElementById('photoInput').value = '';
}

function clearAll(){
  if(!confirm('入力した内容をすべてクリアします。よろしいですか？')) return;
  document.querySelectorAll('[contenteditable="true"]').forEach(el=>{ el.textContent=''; });
  document.querySelectorAll('input[type="checkbox"]').forEach(el=>{ el.checked=false; });
  document.getElementById('histBody1').innerHTML='';
  document.getElementById('histBody2').innerHTML='';
  removePhoto();
  initRows();
}
</script>
